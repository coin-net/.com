<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
        * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
}

body, html {
  height: 100%;
  background-color: #0d0d0d;
  color: white;
}

.login-screen {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 24px 20px;
}

.top h1 {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 4px;
}

.create-now {
  font-size: 14px;
  color: #aaa;
}

.create-now a {
  color: #a855f7;
  text-decoration: none;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.input {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 12px;
  background-color: #1a1a1a;
  color: white;
  font-size: 16px;
}

.password-wrapper {
  position: relative;
}

.toggle-password {
  position: absolute;
  top: 50%;
  right: 16px;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: none;
  padding: 0;
  color: #a855f7;
}

.icon {
  width: 20px;
  height: 20px;
}
.forgot-password {
  text-align: center;
  color: #a855f7;
  font-size: 14px;
  text-decoration: none;
}

.buttons {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.sign-in {
  width: 100%;
  background-color: #4c1d95;
  border: none;
  border-radius: 12px;
  padding: 16px;
  color: white;
  font-size: 16px;
  cursor: none;
}

.google {
  width: 100%;
  background-color: #1a1a1a;
  border: none;
  border-radius: 12px;
  padding: 16px;
  color: white;
  font-size: 16px;
  cursor: none;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
}

.google img {
  width: 20px;
  height: 20px;
} 
  </style>
</head>
<body>
  <div class="login-screen">
    <div class="top">
      <h1>Sign in to account</h1>
      <p class="create-now">New here? <a style="cursor: none;" href="page-sign up.html">Create now</a></p>
    </div>

    <div class="form-group">
      <input type="email" placeholder="Email" class="input"/>
      
     <div class="password-wrapper">
  <input type="password" placeholder="Password" id="password" class="input" />
  <button id="togglePassword" class="toggle-password" aria-label="Toggle Password Visibility">
    <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7c-1.274 4.057-5.065 7-9.542 7S3.732 16.057 2.458 12z" />
    </svg>
  </button>
</div>
      <a href="#" style="cursor: none;" class="forgot-password">Forgot your password?</a>
    </div>

    <div class="buttons">
      <button class="sign-in">Sign in</button>
      <button class="google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G" />
        Sign in with Google
      </button>
    </div>
  </div>
  <script>
     const togglePassword = document.getElementById('togglePassword');
const passwordInput = document.getElementById('password');

const eye = `
<svg xmlns="http://www.w3.org/2000/svg" class="icon eye-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
    d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7c-1.274 4.057-5.065 7-9.542 7S3.732 16.057 2.458 12z" />
</svg>
`;

const eyeOff = `
<svg xmlns="http://www.w3.org/2000/svg" class="icon eye-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.98 9.98 0 012.224-3.592m3.292-2.356A9.953 9.953 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.968 9.968 0 01-4.032 5.225M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
    d="M3 3l18 18" />
</svg>
`;

let isPasswordVisible = false;

togglePassword.addEventListener('click', () => {
  isPasswordVisible = !isPasswordVisible;
  passwordInput.type = isPasswordVisible ? 'text' : 'password';
  togglePassword.innerHTML = isPasswordVisible ? eyeOff : eye;
});
  </script>
  <script src="disable-zoom.js"></script>
</body>
</html>
