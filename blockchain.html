   <style>
    #message-box {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #444;
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 16px;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 1000;
    }

    #message-box.show {
      opacity: 1;
    }
  </style>
  <div id="message-box"></div>
  <script>
    const messageBox = document.getElementById('message-box');

    function showMessage(text, duration = 3000) {
      messageBox.textContent = text;
      messageBox.classList.add('show');

      setTimeout(() => {
        messageBox.classList.remove('show');
      }, duration);
    }

    window.addEventListener('online', () => {
      showMessage('You are now online.');
    });

    window.addEventListener('offline', () => {
      showMessage('Error: You are currently offline.');
    });
  </script>
  <script src="disable-zoom.js"></script>
<script>
  // Parse query parameters from URL
  const params = new URLSearchParams(window.location.search);
  const coin = params.get("coin");
  const logo = params.get("logo");

  // Update DOM if parameters are found
  const coinNameElement = document.getElementById("coinName");
  const coinLogoElement = document.getElementById("coinLogo");

  if (coin && logo) {
    coinNameElement.textContent = coin;
    coinLogoElement.src = logo;
    coinLogoElement.alt = `${coin} Logo`;
    coinLogoElement.style.display = 'block';
  } else {
    coinNameElement.textContent = "No coin data received.";
  }
</script>
<script>
  document.getElementById("coinnetWalletTrigger").addEventListener("click", function(event) {
    event.preventDefault(); 
    document.getElementById("walletModal").style.display = "flex";
  });

  function closeWalletModal() {
    document.getElementById("walletModal").style.display = "none";
  }

  function confirmWallet() {
    // Redirect the user to another page when "Okay" is clicked
    window.location.href = "receive.html"; // Change this to your desired page
  }
</script>
