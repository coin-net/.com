<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Assets</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
      .asset{
      width: 100%;
      padding: 16px;
      background-color: #b98c1e;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: none;
      }
      
      .asset {
       position: fixed;
       bottom: 0;
       left: 0;
       width: 100%;
      }
      
      svg {
      width: 20px;
      height: 20px;
      stroke: #ffffff;
        }    
  </style>
  
</head>
<body class="bg-black text-white font-sans" style="width: 100%; height: 100%;">
  <!-- Top bar -->
  <div class="flex items-center justify-between p-4 bg-gray-900 rounded-b-xl" style="background: transparent;">
      
     <div class="header-left" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
        <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    
    <h2 class="text-lg font-semibold">My Wallet</h1>
    
    <div class="text-white">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 20h5v-2a3 3 0 00-3-3h-2m-4 5v-6a2 2 0 012-2h4M3 8h10M3 12h6m-6 4h8"/>
      </svg>
    </div>
  </div>

  <!-- Total Assets -->
  <div class="px-4 mt-6">
    <div class="flex items-center justify-between text-sm text-gray-400 mb-1">
      <span>Total Assets</span>
      <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
        <path d="M10 2a6 6 0 100 12A6 6 0 0010 2zM9 5a1 1 0 012 0v3a1 1 0 01-2 0V5zm1 6a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/>
      </svg>
    </div>
    <div class="text-3xl font-bold" id="displayBalanceFive">$ 0<span class="text-base">.00</span></div>
  </div>

  <!-- Deposit promo -->
  <div class="flex flex-col items-center justify-center mt-8 px-6">
    <img src="wallet.png" alt="wallet" style="height: 35%; width: 35%;">
    <p class="text-center text-sm font-medium mb-4">Deposit now and start your crypto journey with Bybit!</p>
    
    <a href="page-top-up.html" class="bg-yellow-400 hover:bg-yellow-300 text-black font-bold py-2 px-6 rounded-xl flex items-center gap-2">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 14l5-5H5l5 5z"/></svg>        
      Deposit
 </a>    
  </div>

  <!-- Account Section -->
  <div class="asset mt-10 px-4" style="margin-top: %;">
    <div class="flex justify-between text-gray-400 text-sm mb-2">
      <span class="font-semibold text-white">Account</span>
      <span style="color: #373737;">Asset</span>
    </div>

    <!-- Funding -->
    <div class="bg-gray-900 rounded-xl p-4 mb-3 flex justify-between items-center">
      <div>
        <div class="text-sm text-white">Crypto</div>
        <div class="text-xs text-gray-400">$0.00</div>
      </div>
      <span class="text-gray-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
        </svg>
      </span>
    </div>
    
    <!-- Unified Trading -->
    <div class="bg-gray-900 rounded-xl p-4 flex justify-between items-center">
      <div>
        <div class="text-sm text-white">Received</div>
        <div class="text-xs text-gray-400">0.00 USD</div>
      </div>
      <span class="text-gray-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
        </svg>
      </span>
    </div>
  </div>
  <script>
  function goBack() {
    window.history.back();
  }
  </script>
  <script>
  const savedBalancefive = parseFloat(localStorage.getItem("userBalance")) || 0;
  document.getElementById("displayBalanceFive").innerText = "$" + savedBalancefive.toFixed(2);
</script>
<script src="delete-account.js"></script>
<script src="disable-zoom.js"></script>
<script src="bootstrap.js"></script>
<script src="bootstrap.min.js"></script>
