<script>
  const resultImg = document.getElementById('resultImg');
  const imageInput = document.getElementById('imageInput');
  const email = localStorage.getItem("email");

  resultImg.addEventListener('click', () => {
    imageInput.click();
  });

  function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file || !email) return;

    const formData = new FormData();
    formData.append("image", file);
    formData.append("email", email);

    fetch("https://database-65ur.onrender.com/upload", {
      method: "POST",
      body: formData
    })
    .then(res => res.json())
    .then(data => {
      if (data.imageUrl) {
        resultImg.src = `https://database-65ur.onrender.com${data.imageUrl}`;
      } else {
        alert("Upload failed.");
      }
    })
    .catch(err => {
      console.error("Upload error:", err);
      alert("Upload failed. Check server.");
    });
  }

  window.addEventListener('DOMContentLoaded', () => {
    if (!email) return;

    fetch(`https://database-65ur.onrender.com/profile?email=${encodeURIComponent(email)}`)
      .then(res => res.json())
      .then(user => {
        if (user && user.email) {
          document.getElementById("emailDisplay").textContent = user.email;
          document.getElementById("passwordDisplay").textContent = user.password;
          document.getElementById("usernameDisplay").textContent = user.email.split("@")[0];
          resultImg.src = user.image && user.image.trim() !== ""
            ? `https://database-65ur.onrender.com${user.image}`
            : "profile.png";
        } else {
          resultImg.src = "profile.png";
        }
      })
      .catch(err => {
        console.error("Failed to load profile", err);
        resultImg.src = "profile.png";
      });
  });
</script>
