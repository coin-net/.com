<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <meta http-equiv=refresh content="10; URL=Home.html">
    
    <title>Telegram Splash Animation</title>
    <style>
        body {
            background-color: #1e1e2d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            background: url('image.png') no-repeat center/cover;
            animation: fadeInOut 2s infinite;
            border-radius: 50%;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="logo"></div>
</body>
</html>
