<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Processing Transfer</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
      flex-direction: column;
    }

    .loader {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #00c3ff;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .message {
      font-size: 18px;
      text-align: center;
    }

    /* Modal Styles */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal-content {
      background: #121212;
      border-radius: 12px;
      padding: 20px 30px;
      text-align: center;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
      width: 70%;
      max-width: 400px;
      color: #fff;
    }

    .modal-content h2 {
      margin-top: 0;
      color: #9c0013;
    }

    .modal-content p {
      font-size: 16px;
      margin: 10px 0;
    }

    .modal-content button {
      margin-top: 20px;
      background: #00c3ff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      color: white;
      cursor: none;
      font-size: 14px;
      width: 50%;
      transition: background 0.3s;
    }

    .modal-content button:hover {
      background: #009ccd;
    }
  </style>
</head>
<body>
  <div class="loader"></div>
  <div class="message">Processing your transfer...</div>

  <!-- Modal -->
  <div class="modal" id="popupModal">
    <div class="modal-content">
      <h2>Transfer Declined!</h2>
      <p id="popupText"></p>
      <button onclick="history.back()">OK</button>
    </div>
  </div>

 <script>
  function getQueryParams() {
    const params = new URLSearchParams(window.location.search);
    return {
      wallet: params.get('wallet'),
      bank: params.get('bank'),
      account: params.get('account'),
      amount: params.get('amount'),
      source: params.get('source') || 'fallback.html'
    };
  }

  window.onload = function() {
    setTimeout(() => {
      const data = getQueryParams();
      const text = `Your transaction of $${data.amount} from wallet ${data.wallet} to bank ${data.bank} (Account: ${data.account}) has been declined,
Reason: Insufficient balance.`;
      document.getElementById('popupText').innerHTML = text;
      document.getElementById('popupModal').style.display = "flex";
    }, 3000);
  };
</script>
<script src="disable-zoom.js"></script>
</body>
</html>
