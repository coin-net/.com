<!DOCTYPE html>
<html lang="en">
<head>
 <script>
window.addEventListener("popstate", function (event) {
  // Show popup
  const confirmed = confirm("Are you sure you want to leave the dashboard?");
  if (confirmed) {
    window.location.href = "scriptout.html"; // redirect to script out page
  } else {
    history.pushState(null, null, location.href); // Cancel back
  }
});

// Push state so popstate will trigger
window.addEventListener("load", function () {
  history.pushState(null, null, location.href);
});
 </script>
